<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water Tank Card — Dev Preview</title>
  <!-- MDI icon font for ha-icon mock -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7/css/materialdesignicons.min.css">
  <style>
    /* HA CSS custom properties — dark theme */
    :root {
      --primary-text-color: #e1e1e1;
      --secondary-text-color: #9e9e9e;
      --card-background-color: #1c1c1e;
      --secondary-background-color: rgba(255,255,255,0.06);
      --divider-color: rgba(255,255,255,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111827;
      color: #e1e1e1;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 24px;
      min-height: 100vh;
    }

    h1 {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-bottom: 20px;
    }

    /* Two cards side by side: English and Danish */
    .cards {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .card-wrap {
      width: 480px;
      height: 280px;
    }

    .card-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.35;
      margin-bottom: 6px;
    }

    /* Controls panel */
    .controls {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      max-width: 720px;
    }

    .ctrl {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ctrl-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .ctrl-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .ctrl-val {
      font-size: 13px;
      font-weight: 700;
      color: #42a5f5;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #1976d2;
    }
  </style>

  <!--
    Mock ha-card and ha-icon BEFORE the card module loads.
    Classic scripts run synchronously before deferred module scripts.
  -->
  <script>
    class HaCard extends HTMLElement {
      connectedCallback() {
        this.style.cssText = [
          'display:block',
          'border-radius:12px',
          'background:var(--card-background-color,#1c1c1e)',
          'box-shadow:0 2px 12px rgba(0,0,0,0.5)',
          'overflow:hidden',
          'height:100%',
        ].join(';');
      }
    }
    customElements.define('ha-card', HaCard);

    class HaIcon extends HTMLElement {
      connectedCallback() { this._render(); }
      static get observedAttributes() { return ['icon']; }
      attributeChangedCallback() { this._render(); }
      _render() {
        const name = (this.getAttribute('icon') || '').replace('mdi:', '');
        this.style.cssText = 'display:inline-flex;align-items:center;justify-content:center';
        this.innerHTML = `<span class="mdi mdi-${name}" style="font-size:var(--mdc-icon-size,24px);color:inherit"></span>`;
      }
    }
    customElements.define('ha-icon', HaIcon);
  </script>
</head>
<body>
  <h1>Water Tank Card — Development Preview</h1>

  <div class="cards">
    <div>
      <div class="card-label">English (en)</div>
      <div class="card-wrap">
        <water-tank-card id="card-en"></water-tank-card>
      </div>
    </div>
    <div>
      <div class="card-label">Danish (da)</div>
      <div class="card-wrap">
        <water-tank-card id="card-da"></water-tank-card>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl">
      <div class="ctrl-header">
        <span class="ctrl-label">Level</span>
        <span class="ctrl-val" id="lbl-level">65%</span>
      </div>
      <input type="range" id="inp-level" min="0" max="100" step="1" value="65">
    </div>
    <div class="ctrl">
      <div class="ctrl-header">
        <span class="ctrl-label">Volume</span>
        <span class="ctrl-val" id="lbl-volume">195 L</span>
      </div>
      <input type="range" id="inp-volume" min="0" max="300" step="1" value="195">
    </div>
    <div class="ctrl">
      <div class="ctrl-header">
        <span class="ctrl-label">Distance</span>
        <span class="ctrl-val" id="lbl-distance">0.52 m</span>
      </div>
      <input type="range" id="inp-distance" min="0.30" max="0.95" step="0.01" value="0.52">
    </div>
  </div>

  <!-- Load the built card as an ES module -->
  <script type="module" src="/dist/water-tank-card.js"></script>

  <script>
    function mockHass(level, volume, distance, lang) {
      return {
        language: lang,
        states: {
          'sensor.water_tank_monitor_water_tank_level': {
            state: String(level),
            attributes: { unit_of_measurement: '%' },
            last_updated: new Date().toISOString(),
          },
          'sensor.water_tank_monitor_water_tank_volume': {
            state: String(volume),
            attributes: { unit_of_measurement: 'L' },
            last_updated: new Date().toISOString(),
          },
          'sensor.water_tank_monitor_water_tank_distance': {
            state: String(distance),
            attributes: { unit_of_measurement: 'm' },
            last_updated: new Date().toISOString(),
          },
        },
      };
    }

    function getValues() {
      return {
        level:    parseFloat(document.getElementById('inp-level').value),
        volume:   parseFloat(document.getElementById('inp-volume').value),
        distance: parseFloat(document.getElementById('inp-distance').value),
      };
    }

    function updateCards() {
      const { level, volume, distance } = getValues();

      document.getElementById('lbl-level').textContent    = level + '%';
      document.getElementById('lbl-volume').textContent   = volume + ' L';
      document.getElementById('lbl-distance').textContent = distance.toFixed(2) + ' m';

      document.getElementById('card-en').hass = mockHass(level, volume, distance, 'en');
      document.getElementById('card-da').hass = mockHass(level, volume, distance, 'da');
    }

    // Wait for the card custom element to be registered (resolves after module executes)
    customElements.whenDefined('water-tank-card').then(() => {
      const config = { tank_capacity: 300 };
      document.getElementById('card-en').setConfig(config);
      document.getElementById('card-da').setConfig(config);

      ['inp-level', 'inp-volume', 'inp-distance'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateCards);
      });

      updateCards();
    });
  </script>
</body>
</html>
