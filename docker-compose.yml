services:
  dev:
    build:
      context: .devcontainer
    volumes:
      - .:/workspace
      # Named volume keeps node_modules inside the container (avoids host/container ABI mismatch)
      - node_modules:/workspace/node_modules
    working_dir: /workspace
    ports:
      - "5001:5000"
    user: node
    command: sh -c "npm install && npm start"
    stdin_open: true
    tty: true

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    volumes:
      - ha-config:/config
      - ./dist:/config/www/ha-watertankcard
    ports:
      - "8123:8123"
    privileged: true
    restart: unless-stopped

volumes:
  node_modules:
  ha-config:
